<!DOCTYPE html>
<html>
  <title>Warehouse Management</title>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 50px;
        background-color: #022C45;
        color: white;
      }
      .container {
      max-width: 900px;
      margin: auto;
    }
    h2 {
      margin-top: 30px;
    }
     .box {
      width: 100%;
      height: 600px;
      border: 1px solid #ccc;
      border-radius: 10px;
      overflow: hidden;
      background: white;
    }
    iframe, img {
      width: 100%;
      height: 100%;
      border: none;
      object-fit: contain;
    }

    </style>
  </head>

  <body>
   
  <div class="container">
  <h2>Invoice</h2>
  <div class="box" id="invoiceBox"></div>

  <h2>Receipt</h2>
  <div class="box" id="receiptBox"></div>
  </div>


    <script 
      src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer>
    </script>
    
    <script>
      
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "c44d8767-7b06-4d32-87b0-5ec88947f33e",
      });
    });
      
    </script>

  <script>
  const params = new URLSearchParams(window.location.search);
  const invoice = params.get("invoice");
  const receipt = params.get("receipt");

  function renderFile(url, containerId) {
    const container = document.getElementById(containerId);

    if (!url) {
      container.innerHTML = "<p style='padding:10px;'>File tidak ditemukan</p>";
      return;
    }

    if (url.includes(".pdf")) {
      container.innerHTML = `
        <div style="padding:20px; text-align:center;">
          <p>Preview tidak tersedia</p>
          <a href="${url}" target="_blank">
            <button style="padding:10px 20px; font-size:16px;">
              Buka / Download PDF
            </button>
          </a>
        </div>
      `;
    } else {
      container.innerHTML = `<img src="${url}" />`;
    }
  }

  renderFile(invoice, "invoiceBox");
  renderFile(receipt, "receiptBox");
</script>

</body>
</html>
